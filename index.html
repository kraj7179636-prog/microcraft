)<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GTA Ultimate Realistic</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; font-family: sans-serif; touch-action: none; }
        #joy-ui { position: fixed; bottom: 30px; left: 30px; width: 120px; height: 120px; background: rgba(255,255,255,0.3); border-radius: 50%; border: 2px solid #fff; z-index: 10; }
        #stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #fff; border-radius: 50%; }
        .btn { position: fixed; width: 80px; height: 80px; background: rgba(0,0,0,0.8); color: white; border-radius: 50%; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 20; }
        #jump-btn { bottom: 130px; right: 30px; }
        #weapon-btn { bottom: 130px; right: 120px; background: #333; }
        #action-btn { bottom: 30px; right: 30px; width: 100px; height: 100px; background: #ff4081; display: none; }
        #exit-btn { bottom: 20px; left: 50%; transform: translateX(-50%); background: #d32f2f; width: 120px; height: 60px; border-radius: 10px; display: none; z-index: 100; }
        #look-area { position: absolute; top: 0; right: 0; width: 100%; height: 100%; z-index: 5; }
    </style>
</head>
<body>

    <div id="joy-ui"><div id="stick"></div></div>
    <div id="jump-btn" class="btn" onclick="jump()">JUMP</div>
    <div id="weapon-btn" class="btn" onclick="toggleWeapon()">GUN</div>
    <div id="action-btn" class="btn" onclick="toggleVehicle()">DRIVE</div>
    <div id="exit-btn" class="btn" onclick="exitToCity()">EXIT</div>
    <div id="look-area"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer, player, gun;
        let mvX = 0, mvZ = 0, yaw = 0, pitch = 0.5;
        let isInside = false, isDriving = false, activeVeh = null;
        let vehicles = [], markers = [], wallBoxes = [];

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87ceeb);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 1.8));

            // ग्राउंड
            const grass = new THREE.Mesh(new THREE.PlaneGeometry(5000, 5000), new THREE.MeshBasicMaterial({color: 0x2e7d32}));
            grass.rotation.x = -Math.PI/2; scene.add(grass);

            // बड़ा कैरेक्टर
            player = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1.8, 3.5, 1), new THREE.MeshBasicMaterial({color: 0x1a237e}));
            body.position.y = 1.75; player.add(body);
            const head = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.2, 1.2), new THREE.MeshBasicMaterial({color: 0xffccbc}));
            head.position.y = 4.1; player.add(head);
            gun = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.6, 2.5), new THREE.MeshBasicMaterial({color: 0x000}));
            gun.position.set(1.2, 2.5, 1.8); gun.visible = false; player.add(gun);
            scene.add(player);

            // बिल्डिंग्स और दीवारें
            createBuilding(100, -80, 0xffff00, "HOUSE_ENTRY");
            createBuilding(-100, -150, 0x0d47a1, "POLICE_ENTRY");
            setupInterior(4000, 4000, 0x5d4037, "house");
            setupInterior(-4000, -4000, 0x444444, "police");

            // रियलिस्टिक गाड़ियाँ
            createRealisticCar(60, 40, 0xd32f2f);
            createRealisticHeli(-120, -250, 0x455a64);

            setupControls();
        }

        function createBuilding(x, z, col, type) {
            const b = new THREE.Mesh(new THREE.BoxGeometry(60, 50, 60), new THREE.MeshBasicMaterial({color: col}));
            b.position.set(x, 25, z); scene.add(b);
            const m = new THREE.Mesh(new THREE.CircleGeometry(10, 32), new THREE.MeshBasicMaterial({color: 0xffffff, side: THREE.DoubleSide}));
            m.rotation.x = -Math.PI/2; m.position.set(x, 0.2, z + 45); m.name = type;
            scene.add(m); markers.push(m);
        }

        function setupInterior(x, z, col, type) {
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshBasicMaterial({color: col}));
            floor.rotation.x = -Math.PI/2; floor.position.set(x, 0, z); scene.add(floor);
            
            const addWall = (w, h, d, px, py, pz) => {
                const wall = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshBasicMaterial({color: 0x333333}));
                wall.position.set(px, py, pz); scene.add(wall);
                wallBoxes.push(new THREE.Box3().setFromObject(wall));
            };
            addWall(200, 70, 5, x, 35, z - 100); addWall(200, 70, 5, x, 35, z + 100);
            addWall(5, 70, 200, x - 100, 35, z); addWall(5, 70, 200, x + 100, 35, z);

            if(type === "house") {
                const bed = new THREE.Mesh(new THREE.BoxGeometry(30, 5, 40), new THREE.MeshBasicMaterial({color: 0xffffff}));
                bed.position.set(x + 60, 2.5, z - 50); scene.add(bed);
                wallBoxes.push(new THREE.Box3().setFromObject(bed));
            } else {
                for(let i=0; i<3; i++) {
                    const cop = new THREE.Mesh(new THREE.BoxGeometry(1.8, 3.5, 1), new THREE.MeshBasicMaterial({color: 0x000}));
                    cop.position.set(x + (i*25) - 25, 1.75, z - 40); scene.add(cop);
                }
            }
        }

        function createRealisticCar(x, z, col) {
            const car = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(15, 5, 28), new THREE.MeshBasicMaterial({color: col}));
            body.position.y = 2.5; car.add(body);
            const windShield = new THREE.Mesh(new THREE.BoxGeometry(12, 4, 1), new THREE.MeshBasicMaterial({color: 0x000, transparent:true, opacity:0.7}));
            windShield.position.set(0, 4.5, 6); windShield.rotation.x = -0.6; car.add(windShield);
            const spoiler = new THREE.Mesh(new THREE.BoxGeometry(14, 1, 5), new THREE.MeshBasicMaterial({color: 0x111}));
            spoiler.position.set(0, 6, -12); car.add(spoiler);
            car.position.set(x, 0.5, z); car.type = "car"; scene.add(car); vehicles.push(car);
        }

        function createRealisticHeli(x, z, col) {
            const heli = new THREE.Group();
            const cabin = new THREE.Mesh(new THREE.SphereGeometry(12, 16, 16), new THREE.MeshBasicMaterial({color: col}));
            cabin.scale.set(1.5, 1, 1); heli.add(cabin);
            const tail = new THREE.Mesh(new THREE.CylinderGeometry(1.5, 3, 35), new THREE.MeshBasicMaterial({color: col}));
            tail.rotation.z = Math.PI / 2; tail.position.set(-25, 0, 0); heli.add(tail);
            const mainRotor = new THREE.Group();
            mainRotor.add(new THREE.Mesh(new THREE.BoxGeometry(50, 0.5, 3), new THREE.MeshBasicMaterial({color: 0x111})));
            mainRotor.position.y = 11; heli.add(mainRotor); heli.rotor = mainRotor;
            const tailRotor = new THREE.Mesh(new THREE.BoxGeometry(8, 0.2, 8), new THREE.MeshBasicMaterial({color: 0x111}));
            tailRotor.position.set(-42, 4, 0); heli.add(tailRotor); heli.tailRotor = tailRotor;
            heli.position.set(x, 15, z); heli.type = "heli"; scene.add(heli); vehicles.push(heli);
        }

        function setupControls() {
            const joy = document.getElementById('joy-ui');
            joy.addEventListener('touchmove', (e) => {
                const t = e.touches[0]; const rect = joy.getBoundingClientRect();
                mvX = (t.clientX - (rect.left + 60)) / 50; mvZ = (t.clientY - (rect.top + 60)) / 50;
                document.getElementById('stick').style.transform = `translate(${mvX*25}px, ${mvZ*25}px)`;
            });
            joy.addEventListener('touchend', () => { mvX=0; mvZ=0; document.getElementById('stick').style.transform='translate(0,0)'; });

            const look = document.getElementById('look-area');
            let lx, ly;
            look.addEventListener('touchstart', (e) => { lx = e.touches[0].clientX; ly = e.touches[0].clientY; });
            look.addEventListener('touchmove', (e) => {
                yaw -= (e.touches[0].clientX - lx) * 0.007; pitch += (e.touches[0].clientY - ly) * 0.007;
                pitch = Math.max(0.2, Math.min(1.2, pitch)); lx = e.touches[0].clientX; ly = e.touches[0].clientY;
            });
        }

        function exitToCity() { isDriving = false; player.visible = true; isInside = false; player.position.set(0, 0, 0); document.getElementById('exit-btn').style.display="none"; scene.background = new THREE.Color(0x87ceeb); }
        function jump() { if(player.position.y < 1) { let v=0.6; const j=()=>{ player.position.y+=v; v-=0.04; if(player.position.y>0) requestAnimationFrame(j); else player.position.y=0; }; j(); } }
        function toggleWeapon() { gun.visible = !gun.visible; }
        function toggleVehicle() { if(isDriving){ isDriving=false; player.visible=true; player.position.copy(activeVeh.position).add(new THREE.Vector3(35,0,0)); } else { isDriving=true; player.visible=false; } }

        function animate() {
            requestAnimationFrame(animate);
            let target = isDriving ? activeVeh : player;

            if (Math.abs(mvX) > 0.1 || Math.abs(mvZ) > 0.1) {
                let s = isDriving ? 2.8 : 1.0;
                let dir = new THREE.Vector3(mvX, 0, mvZ).normalize().applyEuler(new THREE.Euler(0, yaw, 0));
                let nextPos = target.position.clone().add(dir.multiplyScalar(s));
                let canMove = true;
                if(isInside) wallBoxes.forEach(box => { if(box.containsPoint(nextPos)) canMove = false; });
                if(canMove) {
                    target.position.copy(nextPos);
                    target.rotation.y = Math.atan2(dir.x, dir.z);
                }
            }

            if(isDriving && activeVeh.type === "heli") {
                activeVeh.rotor.rotation.y += 0.9;
                activeVeh.tailRotor.rotation.z += 1.2;
                if(mvZ < -0.5) activeVeh.position.y += 1.0;
                if(mvZ > 0.5 && activeVeh.position.y > 5) activeVeh.position.y -= 1.0;
            }

            if(!isInside && !isDriving) {
                markers.forEach(m => {
                    if(player.position.distanceTo(m.position) < 18) {
                        isInside = true;
                        if(m.name === "HOUSE_ENTRY") player.position.set(4000, 0, 4000);
                        else player.position.set(-4000, 0, -4000);
                        document.getElementById('exit-btn').style.display = "flex";
                        scene.background = new THREE.Color(0x111111);
                    }
                });
                activeVeh = null;
                vehicles.forEach(v => { if(player.position.distanceTo(v.position) < 35) activeVeh = v; });
                document.getElementById('action-btn').style.display = activeVeh ? "flex" : "none";
            }

            let d = isDriving ? 80 : 60;
            camera.position.lerp(new THREE.Vector3(target.position.x + Math.sin(yaw)*d, target.position.y + (pitch*60), target.position.z + Math.cos(yaw)*d), 0.1);
            camera.lookAt(target.position.x, target.position.y + 8, target.position.z);
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
